# labels.yml — AusTraits family label taxonomy (single source of truth)
#
# Scope: AusTraits FAMILY only. Applied by apply-labels.sh to a hard-coded repo list.
#
# Deliberately SMALL — 8 labels. The guiding rule: a label only exists for what the BOARD can't
# express. The board (#9) owns the linear workflow and metadata; labels own the orthogonal stuff.
#
# ORG CONSISTENCY: the work-type core (bug/task/epic) uses the same names + descriptions as
# plant-family board #5, so an issue reads the same across both families. Colours are a conventional,
# distinct palette (bug=red, task=blue, epic=purple) — plant's current colours aren't intuitive
# (task & epic both blue); intent is to converge plant onto this palette too.
#
# WHAT THE BOARD OWNS (not labels — they don't auto-sync, so mirroring drifts):
#   * Status  : Backlog / In Progress / Done / On-going  (new issues land with NO status = the
#               "triage" queue; triaging sets Priority + moves to Backlog. There is NO triage label.)
#   * Priority: high / medium / low / no-plans
#   * Area    : dev / data  (cross-cutting cut, mirrors plant #5's Area field)
#   * Which repo : the board's Repository field (so there are NO pkg: labels)
#   * Sub-area within a repo : a `[prefix]` in the issue title (e.g. `[schema] ...`)
#
# See governance/project-board.md and governance/triage.md.

labels:

  # ---- work-type (shared org core; same names/descriptions as plant #5) ---------
  - name: "bug"
    color: "d73a4a"          # red — defect
    description: "Existing feature not functioning as intended"
  - name: "task"
    color: "0075ca"          # blue — discrete work
    description: "A discrete task needed for a feature"
  - name: "epic"
    color: "6f42c1"          # purple — big feature/capability
    description: "A new feature or capability"

  # ---- orthogonal flags (coexist with any board Status; bare, not status:*) -----
  - name: "blocked"
    color: "e99695"
    description: "Blocked on another issue, repo, or external dependency."
  - name: "needs-info"
    color: "d4c5f9"
    description: "Waiting on reporter/maintainer for more information."

  # ---- community ----------------------------------------------------------------
  - name: "question"
    color: "d876e3"
    description: "A question or request for clarification."

  # ---- cross-package signals (the meta repo's reason to exist) ------------------
  - name: "cross-package"
    color: "fb8c00"
    description: "Ripples beyond this repo: coordinated changes/rebuilds across packages."
  - name: "breaking"
    color: "e11d21"
    description: "Breaking change with downstream impact — update dependents."
