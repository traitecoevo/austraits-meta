# labels.yml — AusTraits family label taxonomy (single source of truth)
#
# PROPOSED — awaiting maintainer sign-off before application.
# Scope: AusTraits FAMILY only. Applied by apply-labels.sh to a hard-coded repo list.
#
# ORG CONSISTENCY (decided 2026-06-28): the work-type core uses the SAME names + descriptions as
# plant-family board #5 (traitecoevo/plant et al.) so an issue reads the same across both families.
# COLOURS: plant's current core colours are not intuitive (task and epic are both blues, hard to
# tell apart). This file instead uses a conventional, distinct palette — bug=red, task=blue,
# epic=purple (Jira-style). The intent is to converge BOTH families on this palette (i.e. update
# plant to match), NOT to diverge. Confirm the palette before applying to either family.
#
# Two tiers:
#   ── ORG-SHARED CORE ──  identical (or recommended) across every traitecoevo family
#        work-type:  bug / task / epic           (verbatim from plant #5)
#        states:     status:triage / blocked / needs-info   (out-of-band, board can't express)
#        community:  good first issue / help wanted / question / duplicate / invalid / wontfix
#   ── MULTI-REPO PATTERN ──  same mechanism org-wide; each family supplies its OWN repos.
#        pkg:*   one per family repo (austraits is multi-repo now; plant is heading there too)
#        cross:* cross-package contract/ripple signals
#        (Plus the board `Area` field (dev/data) and `[prefix]` issue titles for sub-areas — both
#         shared org conventions, not labels. See governance/project-board.md.)
#
# DIVISION OF LABOUR WITH THE BOARD (#9): board single-select fields own Status (Backlog/In Progress/
# Done/On-going) and Priority. We do NOT mirror them as labels (they don't auto-sync -> drift). The
# proposed "Area" field (dev/data) also lives on the board, mirroring plant #5's Area field — not a
# label. Labels own only what the board can't: component (pkg:), kind (bug/task/epic), cross-package
# impact (cross:), and the pre-board / out-of-band states (status:*).

labels:

  # ========================== ORG-SHARED CORE (== plant #5) ==========================

  # ---- work-type: bug / task / epic (verbatim from traitecoevo/plant) -----------
  - name: "bug"
    color: "fc2929"
    description: "Existing feature not functioning as intended"
  - name: "task"
    color: "84b6eb"
    description: "A discrete task needed for a feature"
  - name: "epic"
    color: "0052cc"
    description: "A new feature or capability"

  # ---- status: ONLY out-of-band states the board doesn't own --------------------
  - name: "status:triage"
    color: "fef2c0"
    description: "Needs triage — not yet assessed or placed on the board."
  - name: "status:blocked"
    color: "e99695"
    description: "Blocked on another issue, repo, or external dependency (migrated from 'blocked')."
  - name: "status:needs-info"
    color: "d4c5f9"
    description: "Waiting on reporter/maintainer for more information."

  # ---- community (standard; some already exist in repos) ------------------------
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers."
  - name: "help wanted"
    color: "008672"
    description: "Maintainers would welcome help here."
  - name: "question"
    color: "d876e3"
    description: "A question or request for clarification."
  - name: "duplicate"
    color: "cfd3d7"
    description: "Already tracked elsewhere."
  - name: "invalid"
    color: "e4e669"
    description: "Not actionable as reported."
  - name: "wontfix"
    color: "ffffff"
    description: "Decided not to act on this."

  # ===================== AUSTRAITS-FAMILY ADDITIONS (this family) =====================

  # ---- pkg: which repo (one per family-folder repo; blue family) ----------------
  # Pipeline core
  - name: "pkg:apd"
    color: "0b3d91"
    description: "APD — the AusTraits Plant Dictionary (trait vocabulary/contract)."
  - name: "pkg:apcalign"
    color: "1d56b0"
    description: "APCalign — taxonomy alignment (APC/APNI)."
  - name: "pkg:traits-build"
    color: "1d76db"
    description: "traits.build — workflow engine + data model/schema."
  - name: "pkg:austraits-build"
    color: "5390d9"
    description: "austraits.build — the AusTraits dataset compilation (glue node)."
  - name: "pkg:austraits"
    color: "7fb2e8"
    description: "austraits — user-facing access/wrangle R package."
  - name: "pkg:meta"
    color: "c5d9f1"
    description: "austraits-meta — cross-package knowledge & governance."
  # Docs / scaffolding
  - name: "pkg:traits-build-book"
    color: "2b8cbe"
    description: "traits.build-book — the traits.build manual."
  - name: "pkg:traits-build-template"
    color: "74a9cf"
    description: "traits.build-template — starter template for new traits.build databases."
  # Apps / API / web
  - name: "pkg:apcalign-app"
    color: "3690c0"
    description: "APCalign-app — Shiny app for APCalign."
  - name: "pkg:austraits-api"
    color: "045a8d"
    description: "austraits-api — HTTP API over AusTraits."
  - name: "pkg:austraits-api-nectar"
    color: "0570b0"
    description: "austraits-api-nectar — API deployment (Nectar)."
  - name: "pkg:austraits-org"
    color: "238b45"
    description: "austraits.org — project website."
  - name: "pkg:austraits-portal"
    color: "41ab5d"
    description: "austraits.portal — data portal."
  # Sibling traits.build databases
  - name: "pkg:ausfizz"
    color: "807dba"
    description: "AusFizz — sibling traits.build database."
  - name: "pkg:ausinvertraits-build"
    color: "9e9ac8"
    description: "ausinvertraits.build — sibling traits.build database (invertebrates)."

  # ---- cross: cross-package signals (the meta repo's reason to exist) -----------
  - name: "cross:breaking"
    color: "e11d21"
    description: "Breaking change with downstream impact across packages (e.g. APD vocabulary change)."
  - name: "cross:ripple"
    color: "fb8c00"
    description: "Requires coordinated changes/rebuilds in more than one family repo."
  - name: "cross:contract"
    color: "ff7f0e"
    description: "Touches a cross-boundary contract/artifact (APD vocab, schema, parquet, released .rds)."
